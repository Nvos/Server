name: takserver

# Local/dev TAK Server stack built from source.
# The TAK entrypoint hard-codes the database host as "takdb", so the DB service
# MUST keep that service name.

services:
  takdb:
    image: postgis/postgis:15-3.3
    container_name: takdb
    env_file: .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - tak-db-data:/var/lib/postgresql/data
    networks:
      - taknet
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 12

  takserver:
    build:
      context: .
      dockerfile: Dockerfile
    image: takserver-fromsource:latest
    container_name: takserver
    env_file: .env
    depends_on:
      takdb:
        condition: service_healthy
    # The ':z' suffix relabels the bind mounts for SELinux (required on Fedora).
    volumes:
      - ./takdata/logs:/opt/tak/data/logs:z
      - ./takdata/certs:/opt/tak/data/certs:z
    ports:
      - "8089:8089"   # client streaming (TLS)
      - "8443:8443"   # admin UI (client-cert auth)
      - "8444:8444"   # federation v2
      - "8446:8446"   # WebTAK / certificate enrollment
      - "9000:9000"   # federation
      - "9001:9001"   # federation
    networks:
      - taknet

networks:
  taknet:

volumes:
  tak-db-data:
